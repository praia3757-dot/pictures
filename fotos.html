<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Lealdade_code</title>
    <style>
        body { background: #000; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; }
        .photo { background: #222; aspect-ratio: 1/1; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #444; font-size: 0.8rem; transition: 0.3s; cursor: pointer; border: 1px solid #333; }
        .photo:hover { filter: brightness(1.5); border-color: #007bff; }
        h2 { color: white; text-align: center; font-family: sans-serif; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>MEU TRABALHO</h2>
    <div class="grid">
        <div class="photo">FOTO 01</div>
        <div class="photo">FOTO 02</div>
        <div class="photo">FOTO 03</div>
        <div class="photo">FOTO 04</div>
    </div>
</body>
</html>
